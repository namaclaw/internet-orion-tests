name: tests

on:
  push:
    branches: ['*']
  pull_request:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why is this manual rerun firing? (free-text — shows up in test_runs.meta)'
        required: false
        default: 'manual rerun from 3Qi Studio'

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-bdd pytest-playwright playwright
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      - name: Run pytest
        id: tests
        run: pytest --junit-xml=junit.xml --tb=short -q
        continue-on-error: true
        env:
          CI: 'true'
          PLAYWRIGHT_TIMEOUT: '30000'
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: junit.xml
          if-no-files-found: ignore
          retention-days: 90
      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: junit.xml
      - name: Check test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
